<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakistan Law Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="logo-container">
                <div class="logo">⚖️</div>
            </div>
            <div class="header-text">
                <h1>LawEase Pakistan</h1>
                <p>AI-Powered Legal Guidance</p>
            </div>
        </header>

        <div class="chat-box" id="chat-box">
            <div class="message bot">
                <div class="message-content">
                    Hello! I am your Pakistan Law Assistant. How can I help you today?
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <textarea id="user-input" placeholder="Ask about FIR, Bail, Penal Code..." rows="1"
                    autofocus></textarea>
                <button id="send-btn" title="Send Message">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round" class="send-icon">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="loading-indicator" id="loading">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
